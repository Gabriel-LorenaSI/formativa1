<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Endereço</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>

    <form id="enderecoForm" novalidate>
        <h2>Cadastro de Endereço</h2>

        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" placeholder="Ex: Maria Silva" pattern="[a-zA-ZÀ-ÿ\s]+">
            <div class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="cep">CEP:</label>
            <input type="text" id="cep" maxlength="9" placeholder="00000-000" pattern="\d{5}-\d{3}">
            <div class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="logradouro">Logradouro:</label>
            <input type="text" id="logradouro" placeholder="Ex: Rua das Flores">
            <div class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="numero">Número:</label>
            <input type="text" id="numero" placeholder="Apenas números" pattern="\d+">
            <div class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="complemento">Complemento (Opcional):</label>
            <input type="text" id="complemento" placeholder="Apto, Bloco, etc.">
            <div class="error-message"></div>
        </div>

        <div class="form-group">
            <label for="uf">UF:</label>
            <input type="text" id="uf" maxlength="2" placeholder="Ex: SP" pattern="[A-Z]{2}">
            <div class="error-message"></div>
        </div>

        <button type="submit" class="submit-btn">Cadastrar</button>
    </form>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <h3>Sucesso!</h3>
            <p>Endereço cadastrado com sucesso.</p>
            <button class="modal-btn" id="closeModalBtn">OK</button>
        </div>
    </div>
</body>
</html>
