<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de cliente</title>
</head>
<body>
    
    <label for="nome"> Nome:
        <input type="text"
        id="nome"
        placeholder="Digite seu nome:"
        minlength="3"
        required
        >
    </label>

    <label for="CPF">CPF
        <input type="text"
        id="CPF"
        placeholder="000.000.000-00"
        maxlength="14"
        required
        >
    </label>

    <label for="dataDeNascimento">Data de nascimento
        <input type="text"
        id="dataDeNascimento"
        placeholder="00/00/0000"
        required
        >
    </label>

    <label for="CEP">CEP
        <input type="text"
        id="CEP"
        placeholder="00000-000"
        required
        >
    </label>

    <label for="Endereço">Logradouro:
        <input type="text"
        id="Endereço"
        minlength="5"
        placeholder="Rua, Avenida..."
        required
        >
    </label>

    <label for="Numero">Número:
        <input type="text"
        id="Numero"
        placeholder="Digite o número"
        required
        >
    </label>

    <label for="Complemento">Complemento (opcional)
        <input type="text"
        id="Complemento"
        placeholder="Apto, Bloco..."
        required
        >
    </label>

    <label for="Cidade">Cidade:
        <input type="text"
        id="Cidade"
        placeholder="Ex: 123"
        minlength="3"
        required
        >
    </label>

    <label for="UF">UF:
        <input type="text"
        id="UF"
        maxlength="2"
        required
        >
    </label>
    
</body>
</html>
